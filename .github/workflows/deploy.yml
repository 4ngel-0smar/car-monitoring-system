name: Deploy to DigitalOcean Kubernetes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install doctl
      uses: digitalocean/action-doctl@v2
      with:
        token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

    - name: Registry Login
      run: doctl registry login --expiry-seconds 1200

    - name: Build ingest-service
      run: docker build -t ingest-service ./services/ingest-service

    - name: Build processing-service
      run: docker build -t processing-service ./services/processing-service

    - name: Tag ingest-service
      run: docker tag ingest-service registry.digitalocean.com/car-monitoring-osmar/ingest-service:latest

    - name: Tag processing-service
      run: docker tag processing-service registry.digitalocean.com/car-monitoring-osmar/processing-service:latest

    - name: Push ingest-service
      run: docker push registry.digitalocean.com/car-monitoring-osmar/ingest-service:latest

    - name: Push processing-service
      run: docker push registry.digitalocean.com/car-monitoring-osmar/processing-service:latest

    - name: Kubeconfig
      run: doctl kubernetes cluster kubeconfig save car-monitoring-cluster

    - name: Deploy
      run: |
        kubectl apply -f k8s/
        kubectl rollout restart deployment ingest-service
        kubectl rollout restart deployment processing-service
