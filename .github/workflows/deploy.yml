name: Deploy to DigitalOcean Kubernetes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install doctl
      uses: digitalocean/action-doctl@v2
      with:
        token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

    - name: Log in to DigitalOcean Registry
      run: doctl registry login --expiry-seconds 1200

    - name: Build Docker image
      run: |
        docker build -t ingest-service ./services/ingest-service

    - name: Tag Docker image
      run: |
        docker tag ingest-service registry.digitalocean.com/car-monitoring-osmar/ingest-service:latest

    - name: Push Docker image
      run: |
        docker push registry.digitalocean.com/car-monitoring-osmar/ingest-service:latest

    - name: Save kubeconfig
      run: |
        doctl kubernetes cluster kubeconfig save car-monitoring-cluster

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/
        kubectl rollout restart deployment ingest-service
