apiVersion: apps/v1
kind: Deployment
metadata:
  name: processing-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: processing-service
  template:
    metadata:
      labels:
        app: processing-service
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: processing-service
        image: registry.digitalocean.com/car-monitoring-osmar/processing-service:latest
        ports:
        - containerPort: 8000
